<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ليث ❤️ هدى</title>

<style>

body{
margin:0;
background:linear-gradient(#fffdf8,#ffffff);
font-family:Tahoma,Arial;
text-align:center;
color:#8b6b2e;
overflow-x:hidden;
}

.container{
padding:25px 15px;
}

.gold{
color:#d4af37;
}

.card{
background:white;
border-radius:30px;
padding:30px 20px;
box-shadow:0 0 40px #d4af37;
}

h1{
font-size:48px;
}

.envelope{
font-size:100px;
cursor:pointer;
animation:float 2s infinite;
}

@keyframes float{
50%{
transform:translateY(-15px);
}
}


.rose{
position:fixed;
top:-30px;
font-size:35px;
animation:fall 8s linear infinite;
z-index:-1;
}

@keyframes fall{

to{
transform:translateY(110vh) rotate(360deg);
}

}


.sparkle{
position:fixed;
font-size:30px;
animation:shine 2s infinite;
}

@keyframes shine{
50%{
opacity:.2;
}
}


.info{
font-size:20px;
line-height:2;
}


.count{
display:flex;
justify-content:center;
gap:8px;
flex-wrap:wrap;
}


.box{
background:#d4af37;
color:white;
padding:12px;
border-radius:15px;
min-width:65px;
}


button{

background:#d4af37;
color:white;
border:0;
padding:15px 25px;
border-radius:30px;
font-size:18px;
margin:8px;

}


</style>

</head>


<body>


<div class="rose">🌹</div>
<div class="rose" style="left:40%;animation-delay:2s">🌹</div>
<div class="rose" style="left:75%;animation-delay:4s">🌹</div>

<div class="sparkle" style="top:20%;left:20%">✨</div>
<div class="sparkle" style="top:40%;right:20%">✨</div>


<div class="container">


<div class="envelope" onclick="openCard()">
💌
</div>


<div class="card" id="card">


<h1>
ليث <span class="gold">❤️</span> هدى
</h1>


<h2>
بكل الحب ندعوكم لحضور حفل زفافنا
</h2>


<div class="info">

<p>📅 11 / 11 / 2026</p>

<p>⏰ 5:00 مساءً</p>

<p>📍 نادي العلوية AL_Alwyah Club</p>

</div>


<h2>⏳ العد التنازلي</h2>


<div class="count">

<div class="box">
<span id="days">0</span><br>يوم
</div>

<div class="box">
<span id="hours">0</span><br>ساعة
</div>

<div class="box">
<span id="minutes">0</span><br>دقيقة
</div>

<div class="box">
<span id="seconds">0</span><br>ثانية
</div>

</div>
<br>

<button onclick="openWaze()">
🚗 الوصول إلى الحفل
</button>


<button onclick="openWhatsApp()">
📱 تأكيد الحضور
</button>


<h2>
✅ تأكيد الحضور
</h2>


<input id="guestName" 
placeholder="اكتب اسمك"
style="padding:12px;border-radius:20px;border:1px solid #d4af37;text-align:center;">


<br><br>


<button onclick="sendConfirm()">
إرسال التأكيد
</button>



</div>

</div>



<script>


function openCard(){

document.getElementById("card").style.display="block";

}



function openWaze(){

window.open(
"https://waze.com/ul/hsvztdbdhm",
"_blank"
);

}



function openWhatsApp(){

window.open(
"https://wa.me/9647727729965",
"_blank"
);

}



function sendConfirm(){

let name=document.getElementById("guestName").value;


if(name==""){

alert("اكتب الاسم أولاً");

return;

}


window.open(
"https://wa.me/9647727729965?text=تأكيد حضور%20من:%20"+name,
"_blank"
);


}




let weddingDate =
new Date("November 11, 2026 17:00:00").getTime();



setInterval(function(){


let now=new Date().getTime();

let distance=weddingDate-now;


let days=Math.floor(distance/(1000*60*60*24));

let hours=Math.floor(
(distance%(1000*60*60*24))/(1000*60*60)
);


let minutes=Math.floor(
(distance%(1000*60*60))/(1000*60)
);


let seconds=Math.floor(
(distance%(1000*60))/1000
);



document.getElementById("days").innerHTML=days;

document.getElementById("hours").innerHTML=hours;

document.getElementById("minutes").innerHTML=minutes;

document.getElementById("seconds").innerHTML=seconds;



},1000);



</script>


</body>
</html>
