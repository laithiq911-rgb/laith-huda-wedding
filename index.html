<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ليث ❤️ هدى</title>

<style>
body {
    margin: 0;
    font-family: "Arial", sans-serif;
    background: #fffaf0;
    color: #8b6b2e;
    text-align: center;
}

.container {
    padding: 40px 20px;
}

h1 {
    font-size: 45px;
}

.envelope {
    font-size: 90px;
    cursor: pointer;
    animation: float 2s infinite;
}

@keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-15px); }
}

.card {
    background: white;
    border-radius: 25px;
    padding: 30px;
    margin-top: 20px;
    box-shadow: 0 0 25px #d4af37;
}

button {
    background: #d4af37;
    color: white;
    border: none;
    padding: 15px 30px;
    border-radius: 30px;
    font-size: 18px;
}
</style>

</head>

<body>

<div class="container">

<div class="envelope">
✉️
</div>

<div class="card">

<h1>ليث ❤️ هدى</h1>

<h2>يسعدنا دعوتكم لحضور حفلنا</h2>

<p>📅 التاريخ والوقت قريباً</p>

<p>📍 نادي العلوية</p>

<button>
تأكيد الحضور
</button>

</div>

</div>

</body>
</html>
