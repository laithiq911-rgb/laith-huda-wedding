<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ليث ❤️ هدى</title>

<style>
body {
    margin:0;
    background:#fffdf8;
    font-family:Tahoma, Arial;
    text-align:center;
    color:#8b6b2e;
    overflow-x:hidden;
}

.container {
    padding:30px 15px;
}

.card {
    background:white;
    border-radius:25px;
    padding:30px 20px;
    box-shadow:0 0 30px #d4af37;
}

h1 {
    font-size:45px;
}

.envelope {
    font-size:90px;
    animation:move 2s infinite;
}

@keyframes move {
    50% {
        transform:translateY(-15px);
    }
}

.rose {
    position:fixed;
    top:-20px;
    animation:fall 8s linear infinite;
    font-size:35px;
}

@keyframes fall {
    to {
        transform:translateY(100vh) rotate(360deg);
    }
}

.gold {
    color:#d4af37;
}

button {
    background:#d4af37;
    color:white;
    border:0;
    padding:15px 30px;
    border-radius:30px;
    font-size:18px;
}

.count {
    display:flex;
    justify-content:center;
    gap:10px;
}

.box {
    background:#d4af37;
    color:white;
    padding:10px;
    border-radius:15px;
}

</style>
</head>

<body>

<div class="rose">🌹</div>
<div class="rose" style="left:40%;animation-delay:2s">🌹</div>
<div class="rose" style="left:75%;animation-delay:4s">🌹</div>


<div class="container">

<div class="envelope">
💌
</div>


<div class="card">

<h1>
ليث <span class="gold">❤️</span> هدى
</h1>

<h2>
دعوتكم لحضور أجمل يوم في حياتنا
</h2>

<hr>

<h3>📅 التاريخ والوقت</h3>
<p>سيتم الإعلان قريباً</p>

<h3>📍 المكان</h3>
<p>نادي العلوية</p>


<h3>⏳ العد التنازلي</h3>

<div class="count">
<div class="box">30<br>يوم</div>
<div class="box">12<br>ساعة</div>
<div class="box">45<br>دقيقة</div>
</div>

<br>

<button>
🚗 موقع الحفل
</button>

</div>

</div>

</body>
</html>
